server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Larger uploads (admin product images, up to ~8MB on the API).
    client_max_body_size 12m;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- API + uploads + health are proxied to the Go backend ---
    location /api/ {
        proxy_pass http://backend:8090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;   # chatbot calls can be slow
    }
    location /uploads/ {
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
    }
    location = /health {
        proxy_pass http://backend:8090;
    }

    # --- static site (Expo Router web export) ---
    # Serve hashed assets with long cache.
    location /_expo/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /assets/ {
        try_files $uri =404;
        expires 30d;
    }

    # Route pages: exact file, then <route>.html, then SPA fallback to index.html
    # so deep links (e.g. /product/5) load and the client router takes over.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
