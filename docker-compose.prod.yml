# Full-stack production deployment for a VPS.
#   1. cp .env.example .env   (then edit the secrets)
#   2. docker compose -f docker-compose.prod.yml up -d --build
# The site is served on port 80 (http://<your-vps-ip>/). nginx inside the `web`
# container proxies /api and /uploads to the Go backend, so everything is one origin.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rpk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-rpk_food}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rpk} -d ${POSTGRES_DB:-rpk_food}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8090"
      DATABASE_URL: postgres://${POSTGRES_USER:-rpk}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rpk_food}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      # Password-reset emails (Gmail SMTP) + the public URL used in reset links.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  pgdata:
  uploads:
